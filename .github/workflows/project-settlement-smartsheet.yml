name: Project Settlement Smartsheet

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate smartsheet records but do not send webhook"
        required: false
        default: false
        type: boolean

concurrency:
  group: project-settlement-smartsheet
  cancel-in-progress: false

jobs:
  run-sync:
    runs-on: ubuntu-latest
    env:
      DB_SOURCE: cloud
      TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      METABASE_USERNAME: ${{ secrets.METABASE_USERNAME }}
      METABASE_PASSWORD: ${{ secrets.METABASE_PASSWORD }}
      WECOM_WEBHOOK_DEFAULT: ${{ secrets.WECOM_WEBHOOK_DEFAULT }}
      WECOM_PROJECT_SETTLEMENT_SMARTSHEET_WEBHOOK: ${{ secrets.WECOM_PROJECT_SETTLEMENT_SMARTSHEET_WEBHOOK }}
      CONTACT_PHONE_NUMBER: ${{ secrets.CONTACT_PHONE_NUMBER }}
      PROJECT_SETTLEMENT_SMARTSHEET_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Run project settlement smartsheet once
        run: PYTHONPATH=. python scripts/run_scheduled_task.py --task project-settlement-smartsheet
