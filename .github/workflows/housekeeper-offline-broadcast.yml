name: Housekeeper Offline Broadcast

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate messages but do not send webhooks"
        required: false
        default: false
        type: boolean

concurrency:
  group: housekeeper-offline-broadcast
  cancel-in-progress: false

jobs:
  run-broadcast:
    runs-on: ubuntu-latest
    env:
      DB_SOURCE: cloud
      TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      METABASE_USERNAME: ${{ secrets.METABASE_USERNAME }}
      METABASE_PASSWORD: ${{ secrets.METABASE_PASSWORD }}
      WECOM_WEBHOOK_DEFAULT: ${{ secrets.WECOM_WEBHOOK_DEFAULT }}
      WECOM_WEBHOOK_HOUSEKEEPER_OFFLINE: ${{ secrets.WECOM_WEBHOOK_HOUSEKEEPER_OFFLINE }}
      CONTACT_PHONE_NUMBER: ${{ secrets.CONTACT_PHONE_NUMBER }}
      HOUSEKEEPER_OFFLINE_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Run housekeeper offline broadcast once
        run: PYTHONPATH=. python scripts/run_scheduled_task.py --task housekeeper-offline-broadcast
